<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BİK Pro 🌸</title>
    
    <!-- OneSignal SDK Yükleme -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "d922022c-39cf-4106-967e-3389f8902f1f",
          notifyButton: {
            enable: false,
          },
          allowLocalhostAsSecureOrigin: true,
        });
      });

      // Sarı butonuna basınca çalışacak fonksiyon
      async function aboneOl() {
        try {
          await OneSignal.Slidedown.showHttpPrompt();
        } catch (e) {
          console.error("Bildirim hatası:", e);
        }
      }
    </script>

    <style>
        body { font-family: sans-serif; text-align: center; background-color: #ffeef2; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #ff85a2; }
        .btn-sari { background-color: #ffb703; color: white; padding: 15px 30px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 20px; width: 100%; }
        .btn-mavi { background-color: #219ebc; color: white; padding: 10px; border: none; border-radius: 10px; width: 45%; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h1>BİK Pro 🌸</h1>
        <p>Bugün: 0 / 2000 ml</p>
        
        <!-- Bardağın veya içeriğin buraya gelecek -->
        <div style="height: 150px; border: 2px solid #333; width: 100px; margin: 20px auto; border-radius: 0 0 20px 20px;"></div>

        <button class="btn-sari" onclick="aboneOl()">BİLDİRİMLERİ AKTİF ET 🔔</button>

        <div class="butonlar">
            <button class="btn-mavi">+150ml</button>
            <button class="btn-mavi">+200ml</button>
            <button class="btn-mavi">+300ml</button>
            <button class="btn-mavi">+500ml</button>
        </div>
    </div>

</body>
</html>
